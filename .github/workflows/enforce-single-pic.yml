name: Enforce Single PIC per Program

on:
  pull_request:
    types: [opened, reopened, synchronize]

jobs:
  lock-program:
    runs-on: ubuntu-latest
    steps:
      - name: Check only one PR per program
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const branch = pr.head.ref;

            const match = branch.match(/^feature\/([^\/]+)\//);
            if (!match) {
              core.setFailed("Branch must follow: feature/{program}/{PIC}");
              return;
            }

            const program = match[1];

            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open"
            });

            const conflict = prs.find(p =>
              p.number !== pr.number &&
              p.head.ref.startsWith(`feature/${program}/`)
            );

            if (conflict) {
              core.setFailed(
                `Program '${program}' already locked by PR #${conflict.number}`
              );
            }
