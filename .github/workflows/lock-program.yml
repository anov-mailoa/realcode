name: Enforce Single PIC per Program

on:
  pull_request:
    types: [opened, reopened, synchronize]

jobs:
  check-lock:
    runs-on: ubuntu-latest

    steps:
      - name: Check existing PRs for same program
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const branch = pr.head.ref;

            // Extract program name from branch (feature/{program}/{name})
            const match = branch.match(/^feature\/([^\/]+)\//);
            if (!match) {
              core.setFailed("Branch naming must follow feature/{program}/{name}");
              return;
            }

            const program = match[1];

            // Get all open PRs
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open"
            });

            // Check if another PR exists for same program
            const conflicting = prs.find(p =>
              p.number !== pr.number &&
              p.head.ref.startsWith(`feature/${program}/`)
            );

            if (conflicting) {
              core.setFailed(
                `Another PR (#${conflicting.number}) is already active for program '${program}'. Only one PIC allowed.`
              );
            }
